# Logrotate config for AI Portal host-level docker logs
# Place at /etc/logrotate.d/ai-portal

/var/lib/docker/containers/*/*-json.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}

/opt/ai-portal/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0644 root root
}
